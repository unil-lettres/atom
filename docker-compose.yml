name: atom          # makes container names nicer (atom-app, …)
services:
  atom-app:
    container_name: atom-app
    image: atom-dev
    networks: [atom-net]
    depends_on:
      atom-mysql: {condition: service_healthy}
      atom-elasticsearch: {condition: service_started}
      atom-gearman: {condition: service_started}

  atom-mysql:
    image: mysql:8.0
    container_name: atom-mysql
    command: mysqld --character-set-server=utf8 --collation-server=utf8_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: atom
      MYSQL_USER: atom
      MYSQL_PASSWORD: atompass
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/mysql
    networks: [atom-net]

  atom-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch-oss:6.8.23
    container_name: atom-elasticsearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock: {soft: -1, hard: -1}
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks: [atom-net]

  atom-gearman:
    image: artefactual/gearmand:1.1.21.2-alpine
    container_name: atom-gearman
    expose: ["4730"]
    networks: [atom-net]

networks:
  atom-net:

volumes:
  atom_app:
  db_data:
  es_data:
  uploads_data:
  logs_data:
