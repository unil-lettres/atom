# docker-compose.yml
name: atom
services:
  
  atom-app:
    depends_on:
      atom-mysql: {condition: service_healthy}
      atom-elasticsearch: {condition: service_started}
      atom-gearman: {condition: service_started}
    networks: [atom-net]
    env_file: .env
  
  atom-mysql:
    image: mysql:8.0
    command: mysqld --character-set-server=utf8 --collation-server=utf8_unicode_ci
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/mysql
    networks: [atom-net]
    env_file: .env
    
  atom-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch-oss:6.8.23
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock: {soft: -1, hard: -1}
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks: [atom-net]

  atom-gearman:
    image: artefactual/gearmand:1.1.21.2-alpine
    expose: ["4730"]
    networks: [atom-net]

networks:
  atom-net:

volumes:
  db_data:
  es_data:
