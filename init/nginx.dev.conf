server {
    listen  80;
    server_name  _;

    # Working copy provided by the atom_app named-volume
    root  /usr/share/nginx/atom;
    index index.php index.html;

    # ------------------------------------------------------------------
    # Static assets  (uploads, dist bundles, vendor libs, plugin themes)
    # ------------------------------------------------------------------
    #
    # Anything matching one of these prefixes is sent straight from disk:
    #   /uploads/r/…       – originals & derivatives
    #   /dist/…            – compiled JS/CSS bundles (AtoM ≥2.9)
    #   /vendor/…          – 3rd-party libs shipped with AtoM
    #   /plugins/<name>/…  – theme / plugin assets (css, js, images, fonts)
    #
    location ~* ^/(uploads/r/|dist/|vendor/|plugins/.*?/(css|js|images?|fonts?)/) {
        access_log   off;
        expires      max;
        try_files    $uri =404;        # 404 quickly if it isn’t on disk
    }

    # ------------------------------------------------------------------
    # Main application – Symfony/Qubit front controller
    # ------------------------------------------------------------------
    location / {
        try_files   $uri $uri/ /index.php?$args;
    }

    # ------------------------------------------------------------------
    # PHP – pass through to the FPM pool running in atom-app
    # ------------------------------------------------------------------
    location ~ \.php$ {
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_pass   atom-app:9000;   # service-name:port
    }

    # ------------------------------------------------------------------
    # Security – block hidden files (.git, .env, etc.)
    # ------------------------------------------------------------------
    location ~ /\. {
        deny all;
    }
}
