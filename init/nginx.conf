server {
    listen 80;
    server_name _;

    root /usr/share/nginx/atom;
    index index.php index.html;

    # Serve static files in uploads directly (bypass PHP)
    location ~* ^/uploads/r/(.*)$ {
        root /usr/share/nginx/atom;
        access_log off;
        expires max;
    }

    # Main app route handling
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP files processing
    location ~ \.php$ {
        # Pass to PHP-FPM running on app:9000 (Docker service name + port)
        fastcgi_pass app:9000;

        include fastcgi_params;

        # Set script filename for PHP processing
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Optional performance/security settings
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # Deny access to hidden files (.git, .env, etc.)
    location ~ /\. {
        deny all;
    }
}
