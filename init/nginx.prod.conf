server {
    listen 80 default_server;
    server_name _;                # replace with real host if you have one

    # Redirect HTTP → HTTPS (assumes a TLS-terminating proxy or certbot container)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name  your.domain.example;   # ← update

    # TLS (self-signed defaults; replace with real cert/key paths)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Strict-Transport-Security, X-Frame-Options, etc.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ------------------------
    # Doc-root & index
    # ------------------------
    root  /usr/share/nginx/atom;
    index index.php;

    # ------------------------
    # Static uploads (cache FOR-EVER, fingerprints are in URL)
    # ------------------------
    location ~* ^/uploads/r/(.*)$ {
        root /usr/share/nginx/atom;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ------------------------
    # Main app
    # ------------------------
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # ------------------------
    # PHP-FPM upstream over *Unix socket* for speed
    # ------------------------
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php-fpm.sock;  # match your php-fpm listen socket
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;

        # Larger buffers for production load
        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 32k;
        fastcgi_connect_timeout  15s;
        fastcgi_send_timeout     30s;
        fastcgi_read_timeout     30s;
    }

    # ------------------------
    # Deny everything under “.” or “/private”
    # ------------------------
    location ~ /\.(?!well-known).* {
        deny all;
    }
    location /private/ { deny all; }
}
