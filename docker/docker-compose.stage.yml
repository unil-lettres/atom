---
volumes:
  elasticsearch_data:
  percona_data:
  atom_src:

services:

  atom:
    image: unillett/atom:development
    env_file: etc/environment
    environment:
      - ATOM_COVERAGE=${ATOM_COVERAGE:-false}
    restart: unless-stopped
    volumes:
      - atom_src:/atom/src
      - ../uploads:/atom/src/uploads:rw
      - ../downloads:/atom/src/downloads:rw
      - ../data:/atom/src/data:rw
      - ../cache:/atom/src/cache:rw

  atom_worker:
    image: unillett/atom:development
    command: worker
    env_file: etc/environment
    environment:
      - ATOM_COVERAGE=${ATOM_COVERAGE:-false}
    depends_on:
      - gearmand
      - percona
    restart: unless-stopped
    volumes:
      - atom_src:/atom/src
      - ../uploads:/atom/src/uploads:rw
      - ../downloads:/atom/src/downloads:rw
      - ../data:/atom/src/data:rw
      - ../cache:/atom/src/cache:rw

  nginx:
    image: nginx:latest
    volumes:
      - atom_src:/atom/src
      - ../uploads:/atom/src/uploads:ro
      - ../downloads:/atom/src/downloads:ro
      - ./etc/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "63001:80"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch-oss:7.10.2
    env_file: etc/environment
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "127.0.0.1:63002:9200"

  percona:
    image: percona:8.0
    env_file: etc/environment
    volumes:
      - percona_data:/var/lib/mysql:rw
      - ./etc/mysql/mysqld.cnf:/etc/my.cnf.d/mysqld.cnf:ro
    ports:
      - "127.0.0.1:63003:3306"

  memcached:
    image: memcached
    command: -p 11211 -m 128 -u memcache
    ports:
      - "127.0.0.1:63004:11211"

  gearmand:
    image: artefactual/gearmand
    ports:
      - "127.0.0.1:63005:4730"
