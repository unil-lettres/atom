---
# Production compose template (intended to be copied to the prod VM under /home/deployer/atom/docker/).
#
# Goals:
# - run the full stack in Docker (php-fpm/app, worker, nginx, ES, MySQL, memcached, gearman)
# - keep legacy host services restartable for rollback
# - expose ONLY Docker nginx on loopback (host nginx remains TLS frontend)
#
# IMPORTANT:
# - Pin ATOM_IMAGE to a fixed tag or digest (avoid floating tags).
#   Example: export ATOM_IMAGE='unillett/atom@sha256:...'

volumes:
  elasticsearch_data:
  percona_data:
  atom_src:

services:
  atom:
    image: ${ATOM_IMAGE:-unillett/atom:development}
    env_file: etc/environment
    environment:
      - ATOM_COVERAGE=${ATOM_COVERAGE:-false}
    depends_on:
      - percona
      - elasticsearch
      - memcached
      - gearmand
    restart: unless-stopped
    volumes:
      - atom_src:/atom/src
      - ../uploads:/atom/src/uploads:rw
      - ../downloads:/atom/src/downloads:rw
      - ../data:/atom/src/data:rw
      - ../cache:/atom/src/cache:rw
      # PHP timezone (affects UI timestamps like Jobs browse)
      - ./etc/php/timezone.ini:/usr/local/etc/php/conf.d/99-timezone.ini:ro

  atom_worker:
    image: ${ATOM_IMAGE:-unillett/atom:development}
    command: worker
    env_file: etc/environment
    environment:
      - ATOM_COVERAGE=${ATOM_COVERAGE:-false}
    depends_on:
      - gearmand
      - percona
    restart: unless-stopped
    volumes:
      - atom_src:/atom/src
      - ../uploads:/atom/src/uploads:rw
      - ../downloads:/atom/src/downloads:rw
      - ../data:/atom/src/data:rw
      - ../cache:/atom/src/cache:rw
      # PHP timezone (keep worker consistent with web container)
      - ./etc/php/timezone.ini:/usr/local/etc/php/conf.d/99-timezone.ini:ro

  nginx:
    image: nginx:1.26
    volumes:
      - atom_src:/atom/src
      - ../uploads:/atom/src/uploads:ro
      - ../downloads:/atom/src/downloads:ro
      - ./etc/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "127.0.0.1:8081:80"
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch-oss:7.10.2
    env_file: etc/environment
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  percona:
    image: percona:8.0
    env_file: etc/environment
    volumes:
      - percona_data:/var/lib/mysql:rw
      - ./etc/mysql/mysqld.cnf:/etc/my.cnf.d/mysqld.cnf:ro
    restart: unless-stopped

  memcached:
    image: memcached
    command: -p 11211 -m 128 -u memcache
    restart: unless-stopped

  gearmand:
    image: artefactual/gearmand
    healthcheck:
      test: ["CMD-SHELL", "test $(netstat -ltn | grep -c ':4730') -ge 1 || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: unless-stopped
